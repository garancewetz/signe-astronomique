      <line x1="51" y1="40" x2="35" y2="51"/>
      <line x1="35" y1="51" x2="13" y2="22"/>
    </g>
    <g fill="#ede9fe">
      <circle cx="13" cy="22" r="1.7"/>
      <circle cx="44" cy="18" r="2"/>
      <circle cx="51" cy="40" r="1.6"/>
      <circle cx="35" cy="51" r="1.5"/>
    </g>
    <circle cx="32" cy="32" r="14" fill="url(#lg-glow)"/>
    <circle cx="32" cy="32" r="6"  fill="url(#lg-core)"/>
