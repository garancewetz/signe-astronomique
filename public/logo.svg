<svg xmlns="http://www.w3.org/2000/svg" viewBox="8 16 64 64" role="img" aria-label="Logo">
  <defs>
    <radialGradient id="lg-bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#1a0b3d"/>
      <stop offset="100%" stop-color="#060210"/>
    </radialGradient>
    <radialGradient id="lg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity=".95"/>
      <stop offset="45%" stop-color="#fbbf24" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lg-core" cx="40%" cy="40%" r="65%">
