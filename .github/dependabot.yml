version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    # Group non-major bumps so a quiet week produces one PR, not twenty.
    groups:
      production-minor-patch:
        dependency-type: production
        update-types: ["minor", "patch"]
      development-minor-patch:
        dependency-type: development
        update-types: ["minor", "patch"]
    # Majors stay as individual PRs — they need human triage.
    versioning-strategy: increase
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
