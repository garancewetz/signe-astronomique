    <script type="application/ld+json">
      {

          {
            "@type": "Question",
            "name": "Quelle différence entre signe astrologique et signe astronomique ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Le signe astrologique repose sur un découpage symbolique du zodiaque, fixé il y a environ 2000 ans, qui divise l'écliptique en douze secteurs égaux de 30°. Le signe astronomique, lui, correspond à la constellation où le Soleil se trouvait réellement le jour de votre naissance, selon les frontières officielles tracées par l'Union Astronomique Internationale (IAU) en 1930. À cause de la précession des équinoxes — un lent basculement de l'axe terrestre — les deux divergent aujourd'hui presque toujours d'un signe entier."
            }
          },
          {
            "@type": "Question",
            "name": "Qu'est-ce qu'Ophiuchus, le 13ᵉ signe oublié du zodiaque ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Ophiuchus, ou le Serpentaire, est la 13ᵉ constellation traversée par le Soleil sur son chemin apparent dans le ciel — l'écliptique. Elle est exclue du zodiaque astrologique traditionnel (qui n'en garde que douze pour s'aligner sur les mois) mais elle est bien réelle astronomiquement : le Soleil y séjourne environ 18 jours par an. Si vous êtes né entre le 30 novembre et le 18 décembre environ, votre vrai signe astronomique est Ophiuchus."
            }
          },
          {
            "@type": "Question",
            "name": "Pourquoi mon vrai signe ne correspond pas à mon horoscope ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Parce que le calendrier astrologique a été figé à l'époque de Ptolémée, vers le IIᵉ siècle. Depuis, la précession des équinoxes — un mouvement très lent de l'axe terrestre, qui décrit un cône complet en environ 26 000 ans — a fait dériver le ciel d'environ 24 jours par rapport à ces dates. Aujourd'hui, le Soleil se trouve presque toujours dans la constellation précédant celle annoncée par l'horoscope. Un Bélier au calendrier est donc le plus souvent un Poissons astronomique."
            }
          },
          {
            "@type": "Question",
            "name": "Qu'est-ce que l'ascendant en astronomie ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "L'ascendant désigne la constellation qui se levait à l'horizon est à l'instant exact de votre naissance. Sa position dépend de l'heure et du lieu : elle change toutes les deux heures environ et n'est pas la même à Paris, à Rio ou à Tokyo. Signe astronomique le calcule en astronomie de position, à partir du temps sidéral local et de votre latitude."
            }
          },
          {
            "@type": "Question",
            "name": "C'est quoi un thème astral, et un thème astral astronomique ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Un thème astral est la carte des positions du Soleil, de la Lune et des planètes vues depuis votre lieu de naissance, à votre date et heure de naissance. La version astrologique projette ces positions sur le zodiaque tropical (douze secteurs symboliques de 30°). La version astronomique de Signe astronomique place chaque astre dans la constellation IAU où il se trouvait réellement, à comparer avec la version traditionnelle."
            }
          }
        ]
